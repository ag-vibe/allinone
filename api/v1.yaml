openapi: 3.0.0

info:
  title: My Anclax Project
  version: "1.0"
  description: API for interacting with my anclax project

servers:
  - url: /api/v1
    description: Base API path

paths:
  /counter:
    get:
      summary: Get Counter
      description: Retrieve the current counter value
      operationId: getCounter
      responses:
        "200":
          description: The current counter value
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Counter"
      security: []
    post:
      summary: Increment Counter
      description: Increment the counter by a specified amount
      operationId: incrementCounter
      responses:
        "202":
          description: The increment was accepted
      security:
        - BearerAuth:
            - x.OperationPermit(c, operationID)

  /todos:
    get:
      summary: List TODO items for current user
      operationId: listTodos
      responses:
        "200":
          description: List of TODO items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodoItem"
      security:
        - BearerAuth: []

    post:
      summary: Create a new TODO item
      operationId: createTodo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTodoRequest"
      responses:
        "201":
          description: Created TODO item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoItem"
      security:
        - BearerAuth: []

  /todos/{id}:
    patch:
      summary: Update a TODO item
      operationId: updateTodo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTodoRequest"
      responses:
        "200":
          description: Updated TODO item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoItem"
        "404":
          description: TODO item not found
      security:
        - BearerAuth: []

    delete:
      summary: Delete a TODO item
      operationId: deleteTodo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: TODO item deleted
        "404":
          description: TODO item not found
      security:
        - BearerAuth: []

components:
  schemas:
    Counter:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          format: int32

    TodoItem:
      type: object
      required: [id, title, done, createdAt, bucket]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        done:
          type: boolean
        bucket:
          type: string
          enum: [later, week, today]
        createdAt:
          type: string
          format: date-time

    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    UpdateTodoRequest:
      type: object
      properties:
        title:
          type: string
        done:
          type: boolean
        bucket:
          type: string
          enum: [later, week, today]

x-check-rules:
  OperationPermit:
    description: Check if the user has permission to perform the operation
    useContext: true
    parameters:
      - name: operationID
        description: The operation ID
        schema:
          type: string

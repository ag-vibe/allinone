openapi: 3.0.0

info:
  title: My Anclax Project
  version: "1.0"
  description: API for interacting with my anclax project

servers:
  - url: http://localhost:2910/api/v1
    description: Local development server
  - url: /api/v1
    description: Base API path

paths:
  /counter:
    get:
      summary: Get Counter
      description: Retrieve the current counter value
      operationId: getCounter
      responses:
        "200":
          description: The current counter value
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Counter"
      security: []
    post:
      summary: Increment Counter
      description: Increment the counter by a specified amount
      operationId: incrementCounter
      responses:
        "202":
          description: The increment was accepted
      security:
        - BearerAuth:
            - x.OperationPermit(c, operationID)

  /todos:
    get:
      summary: List TODO items for current user
      operationId: listTodos
      responses:
        "200":
          description: List of TODO items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodoItem"
      security:
        - BearerAuth: []

    post:
      summary: Create a new TODO item
      operationId: createTodo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTodoRequest"
      responses:
        "201":
          description: Created TODO item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoItem"
      security:
        - BearerAuth: []

  /todos/{id}:
    patch:
      summary: Update a TODO item
      operationId: updateTodo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTodoRequest"
      responses:
        "200":
          description: Updated TODO item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoItem"
        "404":
          description: TODO item not found
      security:
        - BearerAuth: []

    delete:
      summary: Delete a TODO item
      operationId: deleteTodo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: TODO item deleted
        "404":
          description: TODO item not found
      security:
        - BearerAuth: []

  /memos:
    get:
      summary: List memos for current user
      operationId: listMemos
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: state
          schema:
            $ref: "#/components/schemas/MemoState"
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        "200":
          description: Memo list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoSummary"
      security:
        - BearerAuth: []

    post:
      summary: Create a new memo
      operationId: createMemo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoRequest"
      responses:
        "201":
          description: Created memo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memo"
        "422":
          description: Invalid memo references
      security:
        - BearerAuth: []

  /memos/{id}:
    get:
      summary: Get memo by ID
      operationId: getMemo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Memo details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memo"
        "404":
          description: Memo not found
      security:
        - BearerAuth: []

    patch:
      summary: Update a memo
      operationId: updateMemo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoRequest"
      responses:
        "200":
          description: Updated memo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memo"
        "404":
          description: Memo not found
        "422":
          description: Invalid memo references
      security:
        - BearerAuth: []

    delete:
      summary: Delete a memo
      operationId: deleteMemo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Memo deleted
        "404":
          description: Memo not found
      security:
        - BearerAuth: []

  /memos/{id}/backlinks:
    get:
      summary: List backlinks for a memo
      operationId: listMemoBacklinks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Backlink list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoSummary"
        "404":
          description: Memo not found
      security:
        - BearerAuth: []

  /tags:
    get:
      summary: List tags for current user
      operationId: listTags
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        "200":
          description: Tag list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagSummary"
      security:
        - BearerAuth: []

  /attachments:
    post:
      summary: Upload attachment
      operationId: uploadAttachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"
      security:
        - BearerAuth: []

  /attachments/{id}:
    get:
      summary: Get attachment metadata
      operationId: getAttachment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attachment metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"
        "404":
          description: Attachment not found
      security:
        - BearerAuth: []

    delete:
      summary: Delete attachment
      operationId: deleteAttachment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Attachment deleted
        "404":
          description: Attachment not found
      security:
        - BearerAuth: []

  /attachments/{id}/content:
    get:
      summary: Download attachment content
      operationId: downloadAttachment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attachment content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Attachment not found
      security:
        - BearerAuth: []

  /attachments/{id}/links:
    post:
      summary: Link attachment to a resource
      operationId: linkAttachment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkAttachmentRequest"
      responses:
        "204":
          description: Attachment linked
        "404":
          description: Attachment not found
      security:
        - BearerAuth: []

    delete:
      summary: Unlink attachment from a resource
      operationId: unlinkAttachment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkAttachmentRequest"
      responses:
        "204":
          description: Attachment unlinked
        "404":
          description: Attachment not found
      security:
        - BearerAuth: []

  /resources/{resourceType}/{resourceId}/attachments:
    get:
      summary: List attachments by resource
      operationId: listAttachmentsByResource
      parameters:
        - in: path
          name: resourceType
          required: true
          schema:
            type: string
        - in: path
          name: resourceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
      security:
        - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Counter:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          format: int32

    TodoItem:
      type: object
      required: [id, title, description, done, createdAt, bucket]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        done:
          type: boolean
        doneAt:
          type: string
          format: date-time
          nullable: true
        bucket:
          type: string
          enum: [later, week, today]
        createdAt:
          type: string
          format: date-time

    MemoState:
      type: string
      enum: [active, archived]

    MemoContent:
      type: object
      additionalProperties: true
      x-go-type: "json.RawMessage"
      x-go-type-imports:
        - "encoding/json"

    Memo:
      type: object
      required: [id, content, plainText, excerpt, state, tags, references, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        content:
          $ref: "#/components/schemas/MemoContent"
        plainText:
          type: string
        excerpt:
          type: string
        state:
          $ref: "#/components/schemas/MemoState"
        tags:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: string
            format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    MemoSummary:
      type: object
      required: [id, plainText, excerpt, state, tags, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        plainText:
          type: string
        excerpt:
          type: string
        state:
          $ref: "#/components/schemas/MemoState"
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    TagSummary:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer
          format: int64

    Attachment:
      type: object
      required: [id, filename, contentType, sizeBytes, createdAt, downloadUrl]
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        downloadUrl:
          type: string

    LinkAttachmentRequest:
      type: object
      required: [resourceType, resourceId]
      properties:
        resourceType:
          type: string
        resourceId:
          type: string
          format: uuid

    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    UpdateTodoRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        done:
          type: boolean
        bucket:
          type: string
          enum: [later, week, today]

    CreateMemoRequest:
      type: object
      required: [content, plainText, excerpt, tags, references]
      properties:
        content:
          $ref: "#/components/schemas/MemoContent"
        plainText:
          type: string
        excerpt:
          type: string
        tags:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: string
            format: uuid

    UpdateMemoRequest:
      type: object
      required: [content, plainText, excerpt, tags, references]
      properties:
        content:
          $ref: "#/components/schemas/MemoContent"
        plainText:
          type: string
        excerpt:
          type: string
        tags:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: string
            format: uuid
        state:
          $ref: "#/components/schemas/MemoState"

x-check-rules:
  OperationPermit:
    description: Check if the user has permission to perform the operation
    useContext: true
    parameters:
      - name: operationID
        description: The operation ID
        schema:
          type: string
